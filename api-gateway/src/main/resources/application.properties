spring.application.name=api-gateway
server.port=8080

spring.cloud.gateway.routes[0].id=resource-service
spring.cloud.gateway.routes[0].uri=lb://resource-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/resources/**

spring.cloud.gateway.routes[1].id=song-service
spring.cloud.gateway.routes[1].uri=lb://song-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/songs/**

spring.cloud.gateway.routes[2].id=storage-service
spring.cloud.gateway.routes[2].uri=lb://storage-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/storages/**

spring.cloud.gateway.routes[3].id=authorization-server
spring.cloud.gateway.routes[3].uri=lb://authorization-server
spring.cloud.gateway.routes[3].predicates[0]=Path=/oauth2/**,/.well-known/**

spring.cloud.gateway.routes[4].id=grafana
spring.cloud.gateway.routes[4].uri=${GRAFANA_URL:http://localhost:3000}
spring.cloud.gateway.routes[4].predicates[0]=Path=/grafana/**

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.client.registry-fetch-interval-seconds=5

management.endpoints.web.exposure.include=health,prometheus

# OAuth2 Resource Server - fetch public keys from auth server's JWKS endpoint.
# Using jwk-set-uri (not issuer-uri) so the same token works from Postman (localhost:9000)
# and inside Docker (authorization-server:9000) without issuer claim mismatch.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVER_URI:http://localhost:9000}/oauth2/jwks

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.enabled=true
logging.pattern.correlation=[${spring.application.name:},%mdc{traceId:-},%mdc{spanId:-}]
