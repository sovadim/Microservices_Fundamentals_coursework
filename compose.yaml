services:
  resource-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${RESOURCE_DB_NAME}
      POSTGRES_USER: ${RESOURCE_DB_USER}
      POSTGRES_PASSWORD: ${RESOURCE_DB_PASSWORD}
    volumes:
      - ./init-scripts/resource-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  song-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${SONG_DB_NAME}
      POSTGRES_USER: ${SONG_DB_USER}
      POSTGRES_PASSWORD: ${SONG_DB_PASSWORD}
    volumes:
      - ./init-scripts/song-db:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  storage-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${STORAGE_DB_NAME}
      POSTGRES_USER: ${STORAGE_DB_USER}
      POSTGRES_PASSWORD: ${STORAGE_DB_PASSWORD}
    volumes:
      - ./init-scripts/storage-db:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    ports:
      - "19000:9000" # API
      - "19001:9001" # Console
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY}
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  activemq:
    image: apache/activemq-artemis:latest
    ports:
      - "61616:61616" # AMQP/messaging protocol
      - "8161:8161"   # Web console
    environment:
      ARTEMIS_USER: ${ACTIVEMQ_USERNAME}
      ARTEMIS_PASSWORD: ${ACTIVEMQ_PASSWORD}
    volumes:
      - activemq_data:/var/lib/artemis-instance
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8161/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    ports:
      - "8888:8888"
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      CONFIG_REPO_PATH: file:///config-repo
    volumes:
      - ./config-repo:/config-repo:ro
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  storage-service:
    build:
      context: .
      dockerfile: storage-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      STORAGE_DB_URL: ${STORAGE_DB_URL}
      STORAGE_DB_USER: ${STORAGE_DB_USER}
      STORAGE_DB_PASSWORD: ${STORAGE_DB_PASSWORD}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      STAGING_BUCKET: ${STAGING_BUCKET}
      PERMANENT_BUCKET: ${PERMANENT_BUCKET}
    depends_on:
      storage-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  resource-service:
    build:
      context: .
      dockerfile: resource-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      SPRING_DATASOURCE_URL: ${RESOURCE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${RESOURCE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${RESOURCE_DB_PASSWORD}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      SPRING_ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      SPRING_ACTIVEMQ_USER: ${ACTIVEMQ_USERNAME}
      SPRING_ACTIVEMQ_PASSWORD: ${ACTIVEMQ_PASSWORD}
    depends_on:
      resource-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      activemq:
        condition: service_healthy
      storage-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  song-service:
    build:
      context: .
      dockerfile: song-service/Dockerfile
#    deploy:
#      replicas: 2
#    ports: # For podman
#      - "8082:8082"
#    ports: # For docker
#      - "8082-8083:8082"
    environment:
      SPRING_DATASOURCE_URL: ${SONG_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${SONG_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${SONG_DB_PASSWORD}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    depends_on:
      song-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  resource-processor:
    build:
      context: .
      dockerfile: resource-processor/Dockerfile
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      SPRING_ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      SPRING_ACTIVEMQ_USER: ${ACTIVEMQ_USERNAME}
      SPRING_ACTIVEMQ_PASSWORD: ${ACTIVEMQ_PASSWORD}
    depends_on:
      eureka-server:
        condition: service_healthy
      activemq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  authorization-server:
    build:
      context: .
      dockerfile: authorization-server/Dockerfile
    ports:
      - "9000:9000"
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      GRAFANA_URL: http://grafana:3000
      AUTH_SERVER_URI: http://authorization-server:9000
    depends_on:
      eureka-server:
        condition: service_healthy
      resource-service:
        condition: service_healthy
      song-service:
        condition: service_healthy
      authorization-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      disable: true

  promtail:
    image: grafana/promtail:latest
    security_opt:
      - label=disable
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: http://localhost:8080/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_LIVE_ALLOWED_ORIGINS: "http://localhost:8080"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  rustfs_data:
  activemq_data:
  prometheus_data:
  grafana_data:
  loki_data:
