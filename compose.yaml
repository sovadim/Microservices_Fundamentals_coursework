services:
  resource-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${RESOURCE_DB_NAME}
      POSTGRES_USER: ${RESOURCE_DB_USER}
      POSTGRES_PASSWORD: ${RESOURCE_DB_PASSWORD}
    volumes:
      - ./init-scripts/resource-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY}
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  song-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${SONG_DB_NAME}
      POSTGRES_USER: ${SONG_DB_USER}
      POSTGRES_PASSWORD: ${SONG_DB_PASSWORD}
    volumes:
      - ./init-scripts/song-db:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"

  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    ports:
      - "8761:8761"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    depends_on:
      - eureka-server
      - resource-service
      - song-service

  activemq:
    image: apache/activemq-artemis:latest
    ports:
      - "61616:61616" # AMQP/messaging protocol
      - "8161:8161"   # Web console
    environment:
      ARTEMIS_USER: ${ACTIVEMQ_USERNAME}
      ARTEMIS_PASSWORD: ${ACTIVEMQ_PASSWORD}
    volumes:
      - activemq_data:/var/lib/artemis-instance
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8161/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  resource-service:
    build:
      context: .
      dockerfile: resource-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: ${RESOURCE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${RESOURCE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${RESOURCE_DB_PASSWORD}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      SPRING_ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      SPRING_ACTIVEMQ_USER: ${ACTIVEMQ_USERNAME}
      SPRING_ACTIVEMQ_PASSWORD: ${ACTIVEMQ_PASSWORD}
    depends_on:
      resource-db:
        condition: service_started
      eureka-server:
        condition: service_started
      rustfs:
        condition: service_healthy
      activemq:
        condition: service_healthy

  resource-processor:
    build:
      context: .
      dockerfile: resource-processor/Dockerfile
    environment:
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      SPRING_ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      SPRING_ACTIVEMQ_USER: ${ACTIVEMQ_USERNAME}
      SPRING_ACTIVEMQ_PASSWORD: ${ACTIVEMQ_PASSWORD}
    depends_on:
      eureka-server:
        condition: service_started
      activemq:
        condition: service_healthy

  song-service:
    build:
      context: .
      dockerfile: song-service/Dockerfile
#    deploy:
#      replicas: 2
#    ports: # For podman
#      - "8082:8082"
#    ports: # For docker
#      - "8082-8083:8082"
    environment:
      SPRING_DATASOURCE_URL: ${SONG_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${SONG_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${SONG_DB_PASSWORD}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    depends_on:
      - song-db
      - eureka-server

volumes:
  rustfs_data:
  activemq_data:
