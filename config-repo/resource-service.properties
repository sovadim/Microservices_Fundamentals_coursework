spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resourcedb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pguser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pgpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

song-service.url=http://song-service
storage-service.url=http://storage-service

s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
s3.access-key=${S3_ACCESS_KEY:s3admin}
s3.secret-key=${S3_SECRET_KEY:s3admin}
s3.region=${S3_REGION:us-east-1}

spring.activemq.broker-url=${SPRING_ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
spring.activemq.user=${SPRING_ACTIVEMQ_USER:activemq}
spring.activemq.password=${SPRING_ACTIVEMQ_PASSWORD:activemq}

resource.upload.queue=resource-upload
resource.processed.queue=resource-processed

resilience4j.circuitbreaker.instances.storageService.sliding-window-size=5
resilience4j.circuitbreaker.instances.storageService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.storageService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.storageService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.storageService.automatic-transition-from-open-to-half-open-enabled=true

storage.fallback.staging.bucket=${STAGING_BUCKET:resources-staging}
storage.fallback.staging.path=/files
storage.fallback.permanent.bucket=${PERMANENT_BUCKET:resources-permanent}
storage.fallback.permanent.path=/files
