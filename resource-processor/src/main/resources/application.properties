spring.application.name=resource-processor
server.port=8083

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.instance.lease-renewal-interval-in-seconds=5
eureka.client.registry-fetch-interval-seconds=5

spring.activemq.broker-url=${SPRING_ACTIVEMQ_BROKER_URL:tcp://localhost:61616}
spring.activemq.user=${SPRING_ACTIVEMQ_USER:activemq}
spring.activemq.password=${SPRING_ACTIVEMQ_PASSWORD:activemq}

resource.upload.queue=resource-upload
resource.processed.queue=resource-processed

resource.service.url=http://resource-service
song.service.url=http://song-service

management.endpoints.web.exposure.include=health,prometheus

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.enabled=true
logging.pattern.correlation=[${spring.application.name:},%mdc{traceId:-},%mdc{spanId:-}]
