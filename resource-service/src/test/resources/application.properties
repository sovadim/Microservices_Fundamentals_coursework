spring.cloud.config.enabled=false

spring.datasource.url=jdbc:h2:mem:resourcedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Use embedded broker so ActiveMQConnectionFactory doesn't dial out
spring.activemq.broker-url=vm://localhost?broker.persistent=false
spring.activemq.user=test
spring.activemq.password=test

# Dummy S3 values — S3Client bean is @MockBean so these are never used
s3.endpoint=http://localhost:9000
s3.access-key=test
s3.secret-key=test
s3.bucket=test-bucket
s3.region=us-east-1
resource.upload.queue=resource-upload
song-service.url=http://localhost:8099